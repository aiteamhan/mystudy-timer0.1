<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
  <title>Focus Timer Pro</title>
  <style>
    :root {
      --work-color: #5b9bbd;
      --break-color: #5fbf8f;
      --reset-red: #ff4d4d;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      background: #222;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      display: flex;
      flex-direction: row;
      height: 100vh;
      width: 100vw;
    }

    .panel {
      flex: 1; /* 始终 1:1 */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      transition: opacity 0.5s ease;
      opacity: 0.3;
      padding: 20px;
      box-sizing: border-box;
    }

    .panel.active { opacity: 1; }
    .work { background: var(--work-color); }
    .break { background: var(--break-color); }

    .title { font-size: 24px; letter-spacing: 8px; margin-bottom: 20px; font-weight: 700; text-transform: uppercase; }

    .time {
      font-size: clamp(60px, 16vw, 120px);
      font-weight: 600;
      text-align: center;
      outline: none;
      font-variant-numeric: tabular-nums;
      padding: 10px 20px;
      border-radius: 15px;
    }

    .controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 100;
    }

    button {
      padding: 15px 40px;
      font-size: 18px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      background: white;
      color: #333;
      font-weight: 700;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; height: calc(100vh - 140px); }
      .time { font-size: 18vw; }
      .controls { bottom: 0; left: 0; transform: none; width: 100%; height: 140px; background: #222; padding: 0 20px 20px 20px; box-sizing: border-box; gap: 12px; align-items: center; }
      button { flex: 1; height: 65px; padding: 0; border-radius: 20px; }
    }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000;
    }
    .modal { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 320px; }
    .menu-btn { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.8); width: 45px; height: 45px; line-height: 45px; text-align: center; border-radius: 50%; z-index: 101; font-size: 20px; }
    .menu { position: fixed; top: 75px; right: 20px; background: white; padding: 20px; border-radius: 15px; display: none; z-index: 100; width: 200px; }
  </style>
</head>

<body>

<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <p style="color:#333; font-weight:bold;">计时正在运行<br>确定要重置吗？</p>
    <div style="display: flex; flex-direction: column-reverse; gap: 10px; margin-top: 20px;">
      <button onclick="closeResetModal()" style="background:#eee; color:#333; width:100%; height:50px; border-radius:15px; border:none;">取消</button>
      <button onclick="confirmReset()" style="background:var(--reset-red); color:white; width:100%; height:50px; border-radius:15px; border:none; font-weight:700;">确定</button>
    </div>
  </div>
</div>

<div class="menu-btn" onclick="toggleMenu(event)">⚙️</div>
<div class="menu" id="menu">
  <label style="color:#666; font-size:12px; font-weight:bold;">WORK COLOR</label>
  <input type="color" id="workColor" value="#5b9bbd" style="width:100%; height:40px; border:none; margin-bottom:15px;">
  <label style="color:#666; font-size:12px; font-weight:bold;">BREAK COLOR</label>
  <input type="color" id="breakColor" value="#5fbf8f" style="width:100%; height:40px; border:none;">
</div>

<div class="container">
  <div class="panel work active" id="workPanel">
    <div class="title">Work</div>
    <div class="time" id="workTime" contenteditable="true">25:00</div>
  </div>

  <div class="panel break" id="breakPanel">
    <div class="title">Break</div>
    <div class="time" id="breakTime" contenteditable="true">05:00</div>
  </div>
</div>

<div class="controls">
  <button onclick="start()">Start</button>
  <button onclick="pause()">Pause</button>
  <button onclick="handleResetClick()">Reset</button>
</div>

<script>
let defaultWork = 25 * 60, defaultBreak = 5 * 60;
let workLeft = defaultWork, breakLeft = defaultBreak;
let isWorkMode = true, timer = null;
let sound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3");

const workDisplay = document.getElementById("workTime"), breakDisplay = document.getElementById("breakTime");
const workPanel = document.getElementById("workPanel"), breakPanel = document.getElementById("breakPanel");
const resetModal = document.getElementById("resetModal"), menu = document.getElementById("menu");

function format(s) { return String(Math.floor(s/60)).padStart(2,'0') + ":" + String(s%60).padStart(2,'0'); }
function parse(t) { let p = t.split(":"); return (parseInt(p[0])||0)*60 + (parseInt(p[1])||0); }

// 核心功能：点击任何地方关闭输入
window.addEventListener('click', function(e) {
  // 1. 处理颜色菜单关闭
  if (menu.style.display === "block" && !menu.contains(e.target) && e.target.className !== 'menu-btn') {
    menu.style.display = "none";
    return;
  }

  // 2. 处理改时间：点非数字区域即代表改完了
  if (document.activeElement === workDisplay || document.activeElement === breakDisplay) {
    if (!workDisplay.contains(e.target) && !breakDisplay.contains(e.target)) {
      workDisplay.blur();
      breakDisplay.blur();
    }
  }
});

[workDisplay, breakDisplay].forEach(el => {
  el.addEventListener("focus", (e) => {
    if (timer) { el.blur(); return; }
    workPanel.classList.add("active");
    breakPanel.classList.add("active");
  });

  el.addEventListener("blur", () => {
    if (timer) return;
    // 自动校验并保存
    let wRaw = workDisplay.innerText, bRaw = breakDisplay.innerText;
    workDisplay.innerText = validate(wRaw);
    breakDisplay.innerText = validate(bRaw);
    
    defaultWork = parse(workDisplay.innerText); 
    defaultBreak = parse(breakDisplay.innerText);
    workLeft = defaultWork; breakLeft = defaultBreak;
    updateVisuals();
  });
});

function validate(t) {
  let p = t.split(":");
  let m = Math.min(parseInt(p[0]) || 0, 999), s = Math.min(parseInt(p[1]) || 0, 59);
  if (m === 0 && s === 0) return "00:01"; // 防止设为0
  return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

function update() {
  if (isWorkMode) {
    if (workLeft > 0) { workLeft--; workDisplay.innerText = format(workLeft); }
    else { sound.play(); isWorkMode = false; workLeft = defaultWork; workDisplay.innerText = format(workLeft); }
  } else {
    if (breakLeft > 0) { breakLeft--; breakDisplay.innerText = format(breakLeft); }
    else { sound.play(); isWorkMode = true; breakLeft = defaultBreak; breakDisplay.innerText = format(breakLeft); }
  }
  updateVisuals();
}

function updateVisuals() {
  if (isWorkMode) { workPanel.classList.add("active"); breakPanel.classList.remove("active"); }
  else { breakPanel.classList.add("active"); workPanel.classList.remove("active"); }
}

function start() { 
  if (!timer) { 
    workDisplay.contentEditable = "false"; breakDisplay.contentEditable = "false";
    timer = setInterval(update, 1000); updateVisuals(); 
  } 
}

function pause() { 
  clearInterval(timer); timer = null; 
  workDisplay.contentEditable = "true"; breakDisplay.contentEditable = "true";
}

function performReset() { 
  pause(); isWorkMode = true; workLeft = defaultWork; breakLeft = defaultBreak;
  workDisplay.innerText = format(workLeft); breakDisplay.innerText = format(breakLeft);
  updateVisuals(); 
}

function handleResetClick() { if (timer) resetModal.style.display = "flex"; else performReset(); }
function confirmReset() { resetModal.style.display = "none"; performReset(); }
function closeResetModal() { resetModal.style.display = "none"; }
function toggleMenu(e) { e.stopPropagation(); menu.style.display = (menu.style.display === "block" ? "none" : "block"); }

document.getElementById("workColor").oninput = function() { workPanel.style.background = this.value; };
document.getElementById("breakColor").oninput = function() { breakPanel.style.background = this.value; };
</script>

</body>
</html>
