<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
  <title>Focus Timer</title>
  <style>
    :root {
      --work-color: #5b9bbd;
      --break-color: #5fbf8f;
      --reset-red: #ff4d4d;
      --reset-red-dark: #d93636;
      --action-blue: #5b9bbd;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      background: #222;
      -webkit-tap-highlight-color: transparent;
    }

    /* --- 核心布局：默认电脑版（左右） --- */
    .container {
      display: flex;
      flex-direction: row; /* 电脑默认左右 */
      height: 100vh;
      width: 100vw;
      transition: all 0.5s ease;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0.3;
      padding: 20px;
    }

    .panel.active { opacity: 1; flex: 1.2; }
    .work { background: var(--work-color); }
    .break { background: var(--break-color); }

    .title { 
      font-size: 24px; 
      letter-spacing: 10px; 
      margin-bottom: 30px; 
      font-weight: 700;
      text-transform: uppercase;
    }

    .time {
      font-size: 100px;
      font-weight: 600;
      text-align: center;
      outline: none;
      font-variant-numeric: tabular-nums;
    }

    /* 电脑版按钮：浮动在中间下方 */
    .controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 100;
    }

    button {
      padding: 15px 40px;
      font-size: 18px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      background: white;
      color: #333;
      font-weight: 700;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      transition: all 0.2s;
    }

    /* --- 手机版专用样式 (屏幕宽度小于 768px) --- */
    @media (max-width: 768px) {
      .container {
        flex-direction: column; /* 手机强制上下 */
        /* 关键：给底部留出 140px 的空间，把内容顶上去 */
        height: calc(100vh - 140px); 
      }

      .title { font-size: 18px; margin-bottom: 10px; }
      .time { font-size: 18vw; }

      /* 手机版按钮座：固定在屏幕最下方，不透明背景 */
      .controls {
        position: fixed;
        bottom: 0;
        left: 0;
        transform: none;
        width: 100%;
        height: 140px; /* 固定的按钮位子 */
        background: #222; /* 按钮区的底座背景，不挡内容 */
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0 20px 20px 20px;
        box-sizing: border-box;
        gap: 12px;
      }

      button {
        flex: 1; /* 按钮撑满宽度，防止点不到 */
        height: 65px;
        padding: 0;
        font-size: 18px;
        border-radius: 20px;
      }
    }

    /* 按钮特殊交互 */
    .btn-confirm { background: var(--reset-red); color: white; }
    .btn-confirm:active { background: var(--reset-red-dark) !important; }
    
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: none; justify-content: center; align-items: center;
      z-index: 1000;
    }
    .modal { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 320px; }
    .modal-btns { display: flex; flex-direction: column-reverse; gap: 10px; margin-top: 20px; }
    .modal-btns button { width: 100%; height: 50px; }

    .menu-btn { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.8); width: 45px; height: 45px; line-height: 45px; text-align: center; border-radius: 50%; z-index: 101; font-size: 20px; }
    .menu { position: fixed; top: 75px; right: 20px; background: white; padding: 20px; border-radius: 15px; display: none; z-index: 100; width: 200px; }
  </style>
</head>

<body>

<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <p style="color:#333; font-weight:bold;">计时正在运行<br>确定要重置吗？</p>
    <div class="modal-btns">
      <button onclick="closeResetModal()" style="background:#eee; color:#333;">取消</button>
      <button class="btn-confirm" onclick="confirmReset()">确定</button>
    </div>
  </div>
</div>

<div class="menu-btn" onclick="toggleMenu(event)">⚙️</div>
<div class="menu" id="menu">
  <label style="color:#666; font-size:12px;">WORK COLOR</label>
  <input type="color" id="workColor" value="#5b9bbd" style="width:100%; margin-bottom:10px;">
  <label style="color:#666; font-size:12px;">BREAK COLOR</label>
  <input type="color" id="breakColor" value="#5fbf8f" style="width:100%;">
</div>

<div class="container">
  <div class="panel work active" id="workPanel">
    <div class="title">Work</div>
    <div class="time" id="workTime" contenteditable="true">25:00</div>
  </div>

  <div class="panel break" id="breakPanel">
    <div class="title">Break</div>
    <div class="time" id="breakTime" contenteditable="true">05:00</div>
  </div>
</div>

<div class="controls">
  <button onclick="start()" style="background:#fff;">Start</button>
  <button onclick="pause()" style="background:#fff;">Pause</button>
  <button onclick="handleResetClick()" style="background:#fff;">Reset</button>
</div>

<script>
let defaultWork = 25 * 60, defaultBreak = 5 * 60;
let workLeft = defaultWork, breakLeft = defaultBreak;
let isWorkMode = true, timer = null;
let sound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3");

const workDisplay = document.getElementById("workTime"), breakDisplay = document.getElementById("breakTime");
const workPanel = document.getElementById("workPanel"), breakPanel = document.getElementById("breakPanel");
const resetModal = document.getElementById("resetModal"), menu = document.getElementById("menu");

function format(s) { return String(Math.floor(s/60)).padStart(2,'0') + ":" + String(s%60).padStart(2,'0'); }
function parse(t) { let p = t.split(":"); return (parseInt(p[0])||0)*60 + (parseInt(p[1])||0); }

[workDisplay, breakDisplay].forEach(el => {
  el.addEventListener("focus", () => { pause(); workPanel.classList.add("active"); breakPanel.classList.add("active"); });
  el.addEventListener("blur", () => {
    defaultWork = parse(workDisplay.innerText); defaultBreak = parse(breakDisplay.innerText);
    workLeft = defaultWork; breakLeft = defaultBreak;
    updateVisuals();
  });
});

function update() {
  if (isWorkMode) {
    if (workLeft > 0) { workLeft--; workDisplay.innerText = format(workLeft); }
    else { sound.play(); isWorkMode = false; workLeft = defaultWork; workDisplay.innerText = format(workLeft); }
  } else {
    if (breakLeft > 0) { breakLeft--; breakDisplay.innerText = format(breakLeft); }
    else { sound.play(); isWorkMode = true; breakLeft = defaultBreak; breakDisplay.innerText = format(breakLeft); }
  }
  updateVisuals();
}

function updateVisuals() {
  if (isWorkMode) { workPanel.classList.add("active"); breakPanel.classList.remove("active"); }
  else { breakPanel.classList.add("active"); workPanel.classList.remove("active"); }
}

function start() { if (!timer) { timer = setInterval(update, 1000); updateVisuals(); } }
function pause() { clearInterval(timer); timer = null; }
function handleResetClick() { if (timer) resetModal.style.display = "flex"; else performReset(); }
function confirmReset() { resetModal.style.display = "none"; performReset(); }
function performReset() { pause(); isWorkMode = true; workLeft = defaultWork; breakLeft = defaultBreak; workDisplay.innerText = format(workLeft); breakDisplay.innerText = format(breakLeft); updateVisuals(); }
function closeResetModal() { resetModal.style.display = "none"; }
function toggleMenu(e) { e.stopPropagation(); menu.style.display = menu.style.display === "block" ? "none" : "block"; }

window.onclick = (e) => { if (!menu.contains(e.target)) menu.style.display = "none"; };
document.getElementById("workColor").oninput = function() { workPanel.style.background = this.value; };
document.getElementById("breakColor").oninput = function() { breakPanel.style.background = this.value; };
</script>

</body>
</html>
